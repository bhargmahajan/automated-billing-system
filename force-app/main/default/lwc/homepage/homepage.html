<template>
    <div class="layout">
        <div class="leftSidebar">
            <lightning-input
                class="searchInput"
                type="search"
                value={searchTerm}
                onchange={handleSearchChange}
                onkeyup={handleSearchChange}
                placeholder="Enter account name">
            </lightning-input>

            <lightning-card title="Accounts" icon-name="standard:account">
                <template if:true={error}>
                    <div class="slds-text-color_error slds-p-around_medium centered-content">
                        Error loading accounts: {error.body.message}
                    </div>
                </template>
            
                <template if:true={accounts.length}>
                    <div class="slds-p-around_medium">
                        <template for:each={accounts} for:item="account">
                            <div 
                                key={account.Id} 
                                class={account.cssClass}
                                data-account-id={account.Id}
                                onclick={handleSelectAccount}>
                                <div class="slds-media slds-media_center">
                                    <div class="slds-media__body">
                                        <p><strong>{account.Name}</strong></p>
                                        <p>{account.Email__c}</p>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
            
                    <template if:false={allLoaded}>
                        <div class="slds-p-around_medium centered-content">
                            <template if:true={loading}>
                                <lightning-spinner alternative-text="Loading accounts" size="medium"></lightning-spinner>
                            </template>
            
                            <template if:false={loading}>
                                <lightning-button label="Load More" onclick={handleLoadMore}></lightning-button>
                            </template>
                        </div>
                    </template>
            
                    <template if:true={showAllAccountsLoaded}>
                        <div class="slds-p-around_medium centered-content">
                            All accounts loaded.
                        </div>
                    </template>
                </template>
            
                <template if:true={noAccounts}>
                    <div class="slds-p-around_medium centered-content">
                        <template if:true={loading}>
                            Loading accounts...
                        </template>
                        <template if:false={loading}>
                            No accounts found.
                        </template>
                    </div>
                </template>
            </lightning-card>
        </div>

        <div class="rightSidebar">
            <template if:false={selectedAccount}>
                <div class="slds-p-around_medium centered-content" style="min-height: 200px;">
                    <p>Select an account to view details</p>
                </div>
            </template>

            <template if:true={selectedAccount}>
                <div class="slds-box slds-theme_default slds-m-bottom_medium">
                    <div class="slds-media slds-media_center slds-m-bottom_small">
                        <div class="slds-media__figure">
                            <lightning-icon icon-name="standard:account" size="large"></lightning-icon>
                        </div>
                        <div class="slds-media__body">
                            <h2 class="slds-text-heading_large"><strong>{selectedAccount.Name}</strong></h2>
                        </div>
                    </div>
                    
                    <div class="slds-p-around_none slds-grid slds-wrap">
                        <div class="detail-row slds-col slds-size_1-of-2">
                            <p><strong>Email: </strong>{selectedAccount.Email__c}</p>
                        </div>
                        <div class="detail-row slds-col slds-size_1-of-2">
                            <p><strong>Phone: </strong>{selectedAccount.Phone}</p>
                        </div>
                    </div>
                </div>

                <lightning-accordion active-section-name={activeSections} onsectiontoggle={handleSectionToggle}>
    
                    <lightning-accordion-section name="loyalty" label="Loyalty Points">
                        <template if:true={selectedAccount}>
                            <div class="slds-p-around_medium">
                                <div class="slds-grid slds-gutters slds-m-bottom_medium">
                                    <div class="slds-col slds-size_1-of-3">
                                        <div class="slds-box slds-text-align_center slds-theme_default">
                                            <div class="slds-text-title_caps slds-text-color_weak slds-m-bottom_xx-small">Total Earned</div>
                                            <div class="slds-text-heading_small" style="color: #027e46;"><strong>{selectedAccount.Loyalty_Points_Earned__c}</strong></div>
                                        </div>
                                    </div>
                                    <div class="slds-col slds-size_1-of-3">
                                        <div class="slds-box slds-text-align_center slds-theme_default">
                                            <div class="slds-text-title_caps slds-text-color_weak slds-m-bottom_xx-small">Total Redeemed</div>
                                            <div class="slds-text-heading_small" style="color: #ea001e;"><strong>{selectedAccount.Loyalty_Points_Redeemed__c}</strong></div>
                                        </div>
                                    </div>
                                    <div class="slds-col slds-size_1-of-3">
                                        <div class="slds-box slds-text-align_center slds-theme_default">
                                            <div class="slds-text-title_caps slds-text-color_weak slds-m-bottom_xx-small">Available</div>
                                            <div class="slds-text-heading_small"><strong>{selectedAccount.remainingPoints}</strong></div>
                                        </div>
                                    </div>
                                </div>
    
                                <h3>Loyalty Transactions</h3>
                                <div>
                                    <template if:true={transactions.length}>
                                        <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_striped slds-m-top_small">
                                            <thead>
                                                <tr class="slds-line-height_reset">
                                                    <th scope="col"><div class="slds-truncate" title="Type">Type</div></th>
                                                    <th scope="col"><div class="slds-truncate" title="Points">Points</div></th>
                                                    <th scope="col"><div class="slds-truncate" title="Date">Date</div></th>
                                                    <th scope="col"><div class="slds-truncate" title="Description">Description</div></th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template for:each={transactions} for:item="tx">
                                                    <tr key={tx.Id} class="slds-hint-parent">
                                                        <td data-label="Type">
                                                            <div class="slds-truncate">{tx.Transaction_Type__c}</div>
                                                        </td>
                                                        <td data-label="Points">
                                                            <div class="slds-truncate" style={tx.pointsStyle}>{tx.displayPoints}</div>
                                                        </td>
                                                        <td data-label="Date">
                                                            <div class="slds-truncate">
                                                                <lightning-formatted-date-time value={tx.CreatedDate} year="numeric" month="short" day="2-digit" hour="2-digit" minute="2-digit"></lightning-formatted-date-time>
                                                            </div>
                                                        </td>
                                                        <td data-label="Description">
                                                            <div class="slds-truncate" title={tx.Description__c}>{tx.Description__c}</div>
                                                        </td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </template>
    
                                    <template if:false={transactions.length}>
                                        <div class="slds-p-around_medium centered-content">
                                            <template if:true={txLoading}>
                                                Loading transactions...
                                            </template>
                                            <template if:false={txLoading}>
                                                No transactions found.
                                            </template>
                                        </div>
                                    </template>
    
                                    <template if:false={txAllLoaded}>
                                        <div class="slds-p-around_medium centered-content">
                                            <template if:true={txLoading}>
                                                <lightning-spinner alternative-text="Loading transactions" size="small"></lightning-spinner>
                                            </template>
                                            <template if:false={txLoading}>
                                                <lightning-button label="Load More" onclick={handleLoadMoreTransactions}></lightning-button>
                                            </template>
                                        </div>
                                    </template>
    
                                    <template if:true={showAllTransactionsLoaded}>
                                        <div class="slds-p-around_medium centered-content">All transactions loaded.</div>
                                    </template>
                                </div>
                            </div>
                        </template>
                        <template if:false={selectedAccount}>
                            <div class="slds-p-around_medium centered-content" style="min-height: 200px;">
                                <p>Select an account to view loyalty details</p>
                            </div>
                        </template>
                    </lightning-accordion-section>

                    <lightning-accordion-section name="payments" label="Payments">
                        <template if:true={selectedAccount}>
                            <div class="slds-p-around_medium centered-content">
                                <p>Payments information will appear here.</p>
                            </div>
                        </template>
                    </lightning-accordion-section>
                </lightning-accordion>
            </template>
            
            
        </div>
    </div>
</template>
